<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Move-Out Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-badge">Items for sale</div>
    <h1>Move-Out Sale</h1>
    <p>Great condition, low prices </br>📞+372 5190 6351 - Brunna</p>
  </header>

  <main id="catalog"></main>

  <footer>
    <p>Interested? Contact me directly to arrange pickup.</br> 📞+372 5190 6351 - Brunna</p>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <button id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script src="catalog.js"></script>
  <script>
    const catalog = document.getElementById("catalog");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxClose = document.getElementById("lightbox-close");

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt;
      lightbox.classList.add("active");
      document.body.style.overflow = "hidden";
      lightboxClose.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove("active");
      document.body.style.overflow = "";
      lightboxImg.src = "";
    }

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    lightboxClose.addEventListener("click", closeLightbox);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });

    items.forEach((item) => {
      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="image-wrap">
          <img
            src="${item.image}"
            alt="${item.name}"
            loading="lazy"
            role="button"
            tabindex="0"
            title="Click to enlarge"
          />
        </div>
        <div class="info">
          <h2>${item.name}</h2>
          <p class="desc">${item.description}</p>
          <div class="bottom">
            <span class="price">${item.currency} ${item.price.toLocaleString("pt-BR")}</span>
            <a class="compare-link" href="${item.storeUrl}" target="_blank" rel="noopener">
              ${item.storeName} ↗
            </a>
          </div>
        </div>
      `;

      const img = card.querySelector("img");

      img.addEventListener("click", () => openLightbox(item.image, item.name));
      img.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") openLightbox(item.image, item.name);
      });

      catalog.appendChild(card);
    });
  </script>

</body>
</html>
